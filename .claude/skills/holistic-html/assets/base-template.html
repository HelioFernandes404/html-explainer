<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    /* surfaces */
    --ivory:  #FAF9F5;   /* page background */
    --paper:  #FFFFFF;   /* cards, callouts, panels */

    /* text */
    --slate:  #141413;   /* h1, h2, primary headings */
    --g700:   #3D3D3A;   /* body text */
    --g500:   #87867F;   /* labels, captions, metadata */

    /* accent */
    --clay:   #D97757;   /* italic em, indices, eyebrow line, hover line */
    --clay-d: #B85C3E;
    --olive:  #788C5D;   /* affirmative / shipped / success */
    --oat:    #E3DACC;   /* warm hover bg, decorative */
    --rust:   #B04A3F;   /* warning / slipped */

    /* tints */
    --g100:   #F0EEE6;
    --g200:   #E6E3DA;
    --g300:   #D1CFC5;

    /* type */
    --serif: ui-serif, Georgia, "Times New Roman", Times, serif;
    --sans:  system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:  ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--ivory);
    color: var(--g700);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* container — choose one */
  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 32px 140px; } /* wide: catalogs, dashboards, comparisons */
  .page { max-width: 860px;  margin: 0 auto; padding: 56px 32px 120px; } /* narrow: explainers, reports, plans */

  /* ── signature: eyebrow ─────────────────── */
  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--g500);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .eyebrow::before {
    content: "";
    width: 24px; height: 1.5px;
    background: var(--clay);
  }

  /* ── signature: hero h1 ─────────────────── */
  h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(38px, 5.4vw, 62px);
    line-height: 1.06;
    letter-spacing: -0.018em;
    color: var(--slate);
    margin: 0 0 8px;
    max-width: 17ch;
  }
  h1 em {
    font-style: italic;
    color: var(--clay);
  }

  /* ── intro / lede ───────────────────────── */
  .intro {
    font-size: 16.5px;
    color: var(--g700);
    margin: 22px 0 0;
    max-width: 620px;
  }
  .intro a { color: var(--clay); text-decoration-color: var(--oat); text-underline-offset: 3px; }
  .intro a:hover { text-decoration-color: var(--clay); }

  /* ── headings inside content ────────────── */
  h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 27px;
    color: var(--slate);
    letter-spacing: -0.012em;
    margin: 48px 0 14px;
    scroll-margin-top: 24px;
  }
  h3 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 20px;
    color: var(--slate);
    margin: 28px 0 10px;
  }

  /* ── signature: numbered section head ───── */
  .sec-head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 10px;
  }
  .sec-head .idx {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--clay);
    font-weight: 600;
    width: 34px;
    flex-shrink: 0;
  }
  .sec-head h2 { margin: 0; }
  .sec-head .count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--g500);
    background: var(--g100);
    padding: 2px 8px;
    border-radius: 999px;
  }

  /* ── body ───────────────────────────────── */
  p { margin: 0 0 12px; max-width: 680px; }
  a { color: var(--clay); }

  /* ── callout / tldr ─────────────────────── */
  .tldr, .callout {
    border: 1.5px solid var(--g300);
    border-left: 3px solid var(--clay);
    border-radius: 10px;
    background: var(--paper);
    padding: 16px 18px;
    margin: 14px 0;
  }
  .tldr b { color: var(--slate); }

  /* ── inline code + code blocks ──────────── */
  code {
    font-family: var(--mono);
    font-size: 0.9em;
    background: var(--g100);
    padding: 0.15em 0.35em;
    border-radius: 4px;
  }
  pre {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--paper);
    border: 1.5px solid var(--g300);
    border-radius: 10px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 14px 0;
  }
  pre code { background: none; padding: 0; font-size: inherit; }

  /* ── tables ─────────────────────────────── */
  table { width: 100%; border-collapse: collapse; margin: 14px 0; }
  th, td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--g300);
    text-align: left;
    font-size: 14.5px;
  }
  th {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--g500);
    font-weight: 600;
    border-bottom: 1.5px solid var(--g300);
  }

  /* ── blockquote ─────────────────────────── */
  blockquote {
    border-left: 3px solid var(--g300);
    color: var(--g500);
    margin: 18px 0;
    padding: 0 1em;
    font-family: var(--serif);
    font-style: italic;
  }

  /* ── pill nav (TOC) ─────────────────────── */
  nav.pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 26px 0 0;
  }
  nav.pills a {
    font-size: 12.5px;
    padding: 7px 14px;
    border: 1.5px solid var(--g300);
    border-radius: 999px;
    text-decoration: none;
    color: var(--g700);
    background: var(--paper);
    transition: border-color 120ms, color 120ms, background 120ms;
  }
  nav.pills a:hover { border-color: var(--slate); color: var(--slate); }

  /* ── card grid ──────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(316px, 1fr));
    gap: 20px;
  }
  .card {
    display: flex;
    flex-direction: column;
    background: var(--paper);
    border: 1.5px solid var(--g300);
    border-radius: 14px;
    text-decoration: none;
    color: inherit;
    transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    overflow: hidden;
  }
  a.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(20, 20, 19, 0.10);
    border-color: var(--slate);
  }
  .card .body { padding: 18px 20px 16px; flex: 1; display: flex; flex-direction: column; }
  .card .title {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    line-height: 1.22;
    color: var(--slate);
    margin-bottom: 7px;
    letter-spacing: -0.008em;
  }
  .card .desc { font-size: 13.5px; color: var(--g700); line-height: 1.5; flex: 1; }

  /* ── status badges ──────────────────────── */
  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1.5px solid var(--g300);
    color: var(--g500);
  }
  .badge.shipped { color: var(--olive); border-color: var(--olive); }
  .badge.slipped { color: var(--rust);  border-color: var(--rust); }
  .badge.live    { color: var(--clay);  border-color: var(--clay); }

  /* ── footer ─────────────────────────────── */
  footer {
    margin-top: 100px;
    border-top: 1.5px solid var(--g300);
    padding-top: 36px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 20px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--g500);
  }
  footer .k {
    font-family: var(--serif);
    font-style: italic;
    color: var(--g700);
    font-size: 15px;
  }

  /* ── focus ──────────────────────────────── */
  :focus-visible {
    outline: 2px solid var(--clay);
    outline-offset: 2px;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="eyebrow">{{EYEBROW_LABEL}}</div>
    <h1>{{TITLE_WITH_<em>EMPHASIS</em>}}</h1>
    <p class="intro">{{ONE_OR_TWO_SENTENCE_LEDE}}</p>
  </header>

  <!-- ===== sections go here ===== -->

  <footer>
    <span class="k">{{SIGNATURE_LINE_IN_SERIF_ITALIC}}</span>
    <span>{{SECONDARY_FOOTER_TEXT}}</span>
  </footer>

</div>
</body>
</html>
